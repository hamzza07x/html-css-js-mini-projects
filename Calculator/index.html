<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container calculator-container">
        <div class="calculator text-center">
            <div class="calculator-display" id="display">0</div>
            <div class="calculator-buttons">
                <!-- First Row -->
                <button class="btn btn-light function" onclick="clearDisplay()">AC</button>
                <button class="btn btn-light function" onclick="toggleSign()">±</button>
                <button class="btn btn-light function" onclick="appendOperator('%')">%</button>
                <button class="btn btn-warning operator" onclick="appendOperator('/')">÷</button>

                <!-- Second Row -->
                <button class="btn btn-dark number" onclick="appendNumber('7')">7</button>
                <button class="btn btn-dark number" onclick="appendNumber('8')">8</button>
                <button class="btn btn-dark number" onclick="appendNumber('9')">9</button>
                <button class="btn btn-warning operator" onclick="appendOperator('*')">×</button>

                <!-- Third Row -->
                <button class="btn btn-dark number" onclick="appendNumber('4')">4</button>
                <button class="btn btn-dark number" onclick="appendNumber('5')">5</button>
                <button class="btn btn-dark number" onclick="appendNumber('6')">6</button>
                <button class="btn btn-warning operator" onclick="appendOperator('-')">−</button>

                <!-- Fourth Row -->
                <button class="btn btn-dark number" onclick="appendNumber('1')">1</button>
                <button class="btn btn-dark number" onclick="appendNumber('2')">2</button>
                <button class="btn btn-dark number" onclick="appendNumber('3')">3</button>
                <button class="btn btn-warning operator" onclick="appendOperator('+')">+</button>

                <!-- Fifth Row -->
                <button class="btn btn-dark zero" onclick="appendNumber('0')">0</button>
                <button class="btn btn-dark number" onclick="appendDot()">.</button>
                <button class="btn btn-warning equal" onclick="calculate()">=</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
